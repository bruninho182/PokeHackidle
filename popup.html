<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: #fff;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
      color: #ffcc00;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0;
    }
    label {
      font-weight: bold;
      font-size: 14px;
    }
    /* Switch estilizado */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #555;
      border-radius: 24px;
      transition: .3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: .3s;
    }
    input:checked + .slider {
      background-color: #4caf50;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .status-text {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h3>⚙️ Poke AutoClick</h3>
  <div class="toggle-row">
    <label>🖱️ AutoClick</label>
    <label class="switch">
      <input type="checkbox" id="toggleAutoClick">
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <label>🔔 Lendário</label>
    <label class="switch">
      <input type="checkbox" id="toggleNotify">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status-text" id="status">Pronto</div>
  <script src="popup.js"></script>
</body>
</html>
