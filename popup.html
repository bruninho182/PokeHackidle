<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéClick</title>

  <!-- Fonte estilo Pokémon -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS externo -->
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="pokedex">
    <!-- HEADER -->
    <div class="header">
      <div class="pokeball-icon"></div>
      <div class="header-info">
        <h2>POKÉCLICK</h2>
        <span>
          <img src="icon-raio.png" class="ico ico-sm" alt="Raio" />
          Auto Catcher
        </span>
      </div>
    </div>

    <!-- DIVISOR POKÉBOLA -->
    <div class="divider"></div>

    <!-- CONTENT -->
    <div class="content">

      <!-- Auto Click -->
      <div class="card">
        <div class="card-header">
          <img src="/img/assets/pokebola.gif" class="ico ico-circle" alt="Alvo" />
          Auto Click
        </div>

        <div class="toggle-item">
          <span class="toggle-name">Ativar bot</span>
          <label class="switch">
            <input type="checkbox" id="toggleAutoClick" checked />
            <span class="switch-slider"></span>
          </label>
        </div>

        <div class="speed-section">
          <div class="speed-top">
            <span class="speed-label">Velocidade de captura</span>
            <span class="speed-num" id="speedDisplay">1000 ms</span>
          </div>
          <input type="range" id="speedSlider" min="500" max="5000" step="100" value="1000" />
        </div>
      </div>

      <!-- Notificações -->
      <div class="card">
        <div class="card-header">
          <img src="/img/assets/pokebola.gif" class="ico ico-circle" alt="Sino" />
          Notificações
        </div>

        <div class="toggle-item">
          <span class="toggle-name">
            <img src="/img/assets/pokebola.gif" class="ico ico-rarity" alt="Coroa"  />
            Lendário
          </span>
          <label class="switch">
            <input type="checkbox" id="toggleNotifyLendaria" checked />
            <span class="switch-slider"></span>
          </label>
        </div>

        <div class="toggle-item">
          <span class="toggle-name">
            <img src="/img/assets/pokebola.gif" class="ico ico-rarity" alt="Diamante" />
            Épico
          </span>
          <label class="switch">
            <input type="checkbox" id="toggleNotifyEpica" checked />
            <span class="switch-slider"></span>
          </label>
        </div>

        <div class="toggle-item">
          <span class="toggle-name">
            <img src="/img/assets/pokebola.gif" class="ico ico-rarity" alt="Estrela" />
            Raro
          </span>
          <label class="switch">
            <input type="checkbox" id="toggleNotifyRara" checked />
            <span class="switch-slider"></span>
          </label>
        </div>
      </div>

      <!-- Estatísticas -->
      <div class="card">
        <div class="card-header">
          <img src="/img/assets/pokebola.gif" class="ico ico-circle" alt="Gráfico" />
          Capturas
        </div>
        <div class="stats-row">
          <div class="stat-box stat-lendario">
            <img src="/img/assets/lendario.gif" class="ico-stat" alt="Coroa" />
            <div class="stat-number" id="countLendaria">0</div>
            <div class="stat-desc">Lendário</div>
          </div>

          <div class="stat-box stat-epico">
            <img src="/img/assets/epico.gif" class="ico-stat" alt="Diamante" />
            <div class="stat-number" id="countEpica">0</div>
            <div class="stat-desc">Épico</div>
          </div>

          <div class="stat-box stat-raro">
            <img src="/img/assets/raro.gif" class="ico-stat" alt="Estrela" />
            <div class="stat-number" id="countRara">0</div>
            <div class="stat-desc">Raro</div>
          </div>

          <div class="stat-box stat-total">
            <img src="/img/assets/pikachu.gif" class="ico-stat" alt="Pasta" />
            <div class="stat-number" id="countTotal">0</div>
            <div class="stat-desc">Total</div>
          </div>
        </div>

        <button class="btn-reset" id="resetStats">
          <img src="/img/assets/treinador.gif" class="ico ico-sm" alt="Lixeira" />
          Limpar contadores
        </button>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <span class="dot"></span>
      Monitorando capturas em tempo real
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
